    Main:
      board: agatka
      device_id: 0
      hydro_name: LFV
    UnLoad Ox:
      board: kromek
      device_id: 0
      hydro_name: UFV
  scheduler:
    Scheduler:
      board: broadcast
      close_on_finish: false
      device_id: 0
      expect_acks_from:
      - agatka
      hydro_name: scheduler_visual
  sensor:
    Calibration id_2:
      a: 1
      b: 0
      board: agatka
      data_type: float
      device_id: 2
      recording: false
      round_to: 2
      scale: 1
      units: B
