    flash:
      board: kromek
      device_id: 0
  heatinglamp:
    Lamp 1:
      board: kromek
      device_id: 2
      margin: 0.5
      dependencies:
        pressure_sensor: PV OX id_3
      target_pressure: 60
    Lamp 2:
      board: kromek
      device_id: 3
      margin: 0.5
      dependencies:
        pressure_sensor: PV OX id_3
      target_pressure: 60
  piston:
    Piston position:
      a: 1
      b: 0
      board: agatka
      data_type: float
      device_id: 31
      hydro_name: Piston
      length: 100
      length_units: mm
      max_val: 100
      min_val: 0
      recording: false
      round_to: 2
      scale: 1e-1
      units: '%'
      volume: 100
      volume_units: l
  relay:
    IGN:
      board: kromek
      device_id: 8
      hydro_name: IGN
